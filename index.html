function toMin(t){const[h,m]=t.split(":").map(Number);return h*60+m;}
function fmt(s){return`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;}
const sb={fontFamily:"inherit",cursor:"pointer",transition:"all 0.15s"};
function Lbl({children,style}){return <div style={{fontSize:10,letterSpacing:"0.12em",textTransform:"uppercase",color:C.muted,fontWeight:500,...style}}>{children}</div>;}
function Card({children,style}){return <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:4,padding:20,...style}}>{children}</div>;}
function Inp({value,onChange,onKeyDown,placeholder,type="text",min,max,style}){return <input type={type} value={value} onChange={onChange} onKeyDown={onKeyDown} placeholder={placeholder} min={min} max={max} style={{width:"100%",background:C.surface,border:`1px solid ${C.border}`,borderRadius:3,padding:"9px 12px",color:C.white,fontSize:13,outline:"none",fontFamily:"inherit",colorScheme:"dark",...style}}/>;}
function Chk({done}){return <div style={{width:16,height:16,borderRadius:2,flexShrink:0,background:done?C.accentDim:"transparent",border:`1px solid ${done?C.accentDim:C.border}`,display:"flex",alignItems:"center",justifyContent:"center"}}>{done&&<div style={{width:6,height:6,background:"#0d0d0d",borderRadius:1}}/>}</div>;}
function DelBtn({onClick}){return <button onClick={e=>{e.stopPropagation();onClick();}} style={{...sb,background:"none",border:"none",color:C.muted,fontSize:16,lineHeight:1,padding:"0 4px",flexShrink:0}}>×</button>;}
function PBtn({label,onClick,disabled,style}){return <button onClick={onClick} disabled={disabled} style={{...sb,background:disabled?C.dim:C.white,color:disabled?C.muted:"#0d0d0d",border:"none",borderRadius:3,padding:"9px 20px",fontSize:12,fontWeight:500,letterSpacing:"0.05em",opacity:disabled?0.5:1,...style}}>{label}</button>;}

function AuthScreen({onLogin,lang}){
  const T=LANGS[lang];
  const [mode,setMode]=useState("login");
  const [form,setForm]=useState({name:"",email:"",password:""});
  const [error,setError]=useState("");
  const submit=()=>{
    setError("");
    if(!form.email.trim()||!form.password.trim()){setError("⚠");return;}
    if(form.password.length<4){setError("⚠");return;}
    const users=load("users",{});
    if(mode==="register"){
      if(!form.name.trim()){setError("⚠");return;}
      if(users[form.email]){setError("⚠");return;}
      users[form.email]={name:form.name,password:form.password};
      save("users",users);save("session",{email:form.email,name:form.name});
      onLogin({email:form.email,name:form.name});
    }else{
      const u=users[form.email];
      if(!u||u.password!==form.password){setError("⚠");return;}
      save("session",{email:form.email,name:u.name});
      onLogin({email:form.email,name:u.name});
    }
  };
  return(<div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>

function AIAnalysis({tasks,T}){
  const [result,setResult]=useState("");const [loading,setLoading]=useState(false);
  const run=async()=>{
    setLoading(true);setResult("");
    const done=tasks.filter(t=>t.done).length,pend=tasks.filter(t=>!t.done).length,high=tasks.filter(t=>t.energy==="alta"&&!t.done).length,hour=new Date().getHours();
    try{const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:`You are an executive productivity consultant. Write a concise analysis (4-5 sentences) with actionable recommendations. No emojis. Plain text only. Respond in the same language as this message language code: ${navigator.language}.\nTime: ${hour}:00 · Done: ${done} · Pending: ${pend} · High energy not done: ${high}`}]})});const data=await res.json();setResult(data.content?.map(c=>c.text||"").join("")||"—");}catch{setResult("—");}
    setLoading(false);

  return(<Card style={{marginBottom:16}}><div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:result||loading?16:0}}><div><Lbl style={{marginBottom:6}}>{T.aiLabel}</Lbl><div style={{fontSize:13}}>{T.aiDesc}</div></div><GBtn label={loading?T.processing:T.runAnalysis} onClick={run}/></div>{(result||loading)&&<><div style={{height:1,background:C.border,margin:"16px 0"}}/><div style={{color:loading?C.muted:C.accent,fontSize:13,lineHeight:1.8,fontStyle:loading?"italic":"normal"}}>{loading?T.analyzing:result}</div></>}</Card>);
}

      {tab==="bloques"&&(<div className="fade">
        <div style={{fontSize:13,fontWeight:500,marginBottom:4}}>{T.agenda}</div><Lbl style={{marginBottom:20}}>{T.agendaSubtitle}</Lbl>
        <Card style={{marginBottom:16}}><div style={{position:"relative"}}>{["06","08","10","12","14","16","18","20","22"].map((h,i)=>(<div key={h} style={{position:"absolute",top:(i/8)*600,left:0,right:0,display:"flex",alignItems:"center",gap:10}}><div style={{fontSize:9,color:C.muted,width:32,textAlign:"right",flexShrink:0}}>{h}:00</div><div style={{flex:1,height:1,background:C.border,opacity:0.4}}/></div>))}<div style={{position:"relative",height:600,paddingLeft:42}}>{blocks.map(block=>{const s=toMin(block.start)-toMin("06:00"),e=toMin(block.end)-toMin("06:00"),tot=toMin("22:00")-toMin("06:00");const top=(s/tot)*600,bh=Math.max(((e-s)/tot)*600,26);return(<div key={block.id} style={{position:"absolute",left:42,right:0,top,height:bh,background:C.dim,borderLeft:`2px solid ${C.accentDim}`,borderRadius:"0 2px 2px 0",padding:"4px 10px",display:"flex",alignItems:"center",justifyContent:"space-between"}}><div><div style={{fontSize:12,fontWeight:500}}>{block.task}</div><div style={{fontSize:9,color:C.muted}}>{block.start} – {block.end}</div></div><DelBtn onClick={()=>deleteBlock(block.id)}/></div>);})}</div></div></Card>
        <div style={{borderTop:`1px solid ${C.border}`,paddingTop:16}}>{!showAddBlock?(<button onClick={()=>setShowAddBlock(true)} style={{...sb,background:"none",border:"none",color:C.muted,fontSize:11,letterSpacing:"0.06em",textTransform:"uppercase"}}>{T.addBlock}</button>):(<div><Lbl style={{marginBottom:12}}>{T.newBlock}</Lbl><input value={newBlock.task} onChange={e=>setNewBlock(b=>({...b,task:e.target.value}))} placeholder={T.blockName} style={{width:"100%",background:C.surface,border:`1px solid ${C.border}`,borderRadius:3,padding:"9px 12px",color:C.white,fontSize:13,outline:"none",fontFamily:"inherit",marginBottom:8}}/><div style={{display:"flex",gap:8,marginBottom:10}}><div style={{flex:1}}><Lbl style={{marginBottom:6}}>{T.blockStart}</Lbl><Inp type="time" value={newBlock.start} onChange={e=>setNewBlock(b=>({...b,start:e.target.value}))}/></div><div style={{flex:1}}><Lbl style={{marginBottom:6}}>{T.blockEnd}</Lbl><Inp type="time" value={newBlock.end} onChange={e=>setNewBlock(b=>({...b,end:e.target.value}))}/></div></div>{newBlock.start&&newBlock.end&&toMin(newBlock.end)<=toMin(newBlock.start)&&<div style={{fontSize:11,color:"#7c4a4a",marginBottom:8}}>{T.blockError}</div>}<div style={{display:"flex",gap:8}}><PBtn label={T.add} onClick={addBlock} disabled={!newBlock.task.trim()||toMin(newBlock.end)<=toMin(newBlock.start)}/><GBtn label={T.cancel} onClick={()=>{setShowAddBlock(false);setNewBlock({task:"",start:"09:00",end:"10:00"});}}/></div></div>)}</div>
      </div>)}

      {tab==="enfoque"&&(<div className="fade">
        <div style={{fontSize:13,fontWeight:500,marginBottom:4}}>{T.focusTitle}</div><Lbl style={{marginBottom:32}}>{T.focusSubtitle}</Lbl>
        <Card style={{textAlign:"center",padding:"36px 24px",marginBottom:16}}><div style={{fontSize:88,fontWeight:200,color:focusRun?C.white:C.accentDim,letterSpacing:"-3px",lineHeight:1,marginBottom:12}}>{fmt(focusTime)}</div><div style={{fontSize:10,color:C.muted,letterSpacing:"0.14em",textTransform:"uppercase",marginBottom:36}}>{focusRun?T.active2:T.waiting}</div><div style={{display:"flex",gap:8,justifyContent:"center"}}><PBtn label={focusRun?T.pause:T.startBtn} onClick={()=>setFocusRun(r=>!r)}/><GBtn label={T.reset} onClick={()=>{setFocusTime(25*60);setFocusRun(false);}}/></div></Card>
        <Card style={{marginBottom:16}}><Lbl style={{marginBottom:14}}>{T.duration}</Lbl><div style={{display:"flex",gap:6}}>{[{l:"25",s:25*60},{l:"45",s:45*60},{l:"90",s:90*60}].map(p=>(<button key={p.l} onClick={()=>{setFocusTime(p.s);setFocusRun(false);}} style={{...sb,flex:1,background:focusTime===p.s?C.dim:"transparent",border:`1px solid ${focusTime===p.s?C.borderHi:C.border}`,borderRadius:3,padding:"10px 8px",color:focusTime===p.s?C.white:C.muted,fontSize:12,fontWeight:500}}>{p.l} min</button>))}</div></Card>
        <Card><Lbl style={{marginBottom:14}}>{T.ambient}</Lbl><div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>{ambientList.map((s,i)=>(<button key={i} onClick={()=>setSound(sound===i?null:i)} style={{...sb,background:sound===i?C.dim:"transparent",border:`1px solid ${sound===i?C.borderHi:C.border}`,borderRadius:3,padding:"10px 8px",color:sound===i?C.white:C.muted,fontSize:11}}>{s}</button>))}</div></Card>
      </div>)}

      {tab==="analisis"&&(<div className="fade">
        <div style={{fontSize:13,fontWeight:500,marginBottom:4}}>{T.analysisTitle}</div><Lbl style={{marginBottom:20}}>{T.analysisSubtitle}</Lbl>
        <AIAnalysis tasks={tasks} T={T}/>
        <Card style={{marginBottom:16}}><Lbl style={{marginBottom:16}}>{T.weekly}</Lbl><div style={{display:"flex",alignItems:"flex-end",gap:4,height:72}}>{[{d:"L",v:8},{d:"M",v:6},{d:"X",v:9},{d:"J",v:7},{d:"V",v:5},{d:"S",v:3},{d:"D",v:0}].map((item,i)=>(<div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:6}}><div style={{width:"100%",height:`${(item.v/10)*56}px`,background:i===6?C.dim:C.accentDim,borderRadius:2}}/><div style={{fontSize:9,color:C.muted,textTransform:"uppercase"}}>{item.d}</div></div>))}</div></Card>
        <Card><Lbl style={{marginBottom:14}}>{T.byArea}</Lbl>{AREA_IDS.map(id=>{const count=tasks.filter(t=>t.category===id).length;const done=tasks.filter(t=>t.category===id&&t.done).length;if(!count)return null;return(<div key={id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:`1px solid ${C.border}`}}><div style={{fontSize:12,width:80,color:C.muted,flexShrink:0}}>{T["area_"+id]}</div><div style={{flex:1,height:2,background:C.dim,borderRadius:1}}><div style={{width:`${Math.round((done/count)*100)}%`,height:"100%",background:C.accentDim,borderRadius:1}}/></div><div style={{fontSize:11,color:C.muted,width:36,textAlign:"right"}}>{done}/{count}</div></div>);})}</Card>
      </div>)}

    </div>
  </div>);
}

// ── Root ───────────────────────────────────────────────────────────────────────
function App(){
  const [phase,setPhase]=useState("splash");
  const [user,setUser]=useState(null);
  const [lang,setLangState]=useState(()=>load("lang","es"));
  const setLang=l=>{setLangState(l);save("lang",l);};
  const handleSplashDone=()=>{const s=load("session",null);if(s){setUser(s);setPhase("app");}else{setPhase("auth");}};
  const handleLogin=u=>{setUser(u);setPhase("app");};
  const handleLogout=()=>{save("session",null);setUser(null);setPhase("auth");};
  if(phase==="splash")return <SplashScreen onDone={handleSplashDone}/>;
  if(phase==="auth"||!user)return <AuthScreen onLogin={handleLogin} lang={lang}/>;
  return <Kronos user={user} onLogout={handleLogout} lang={lang} setLang={setLang}/>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
